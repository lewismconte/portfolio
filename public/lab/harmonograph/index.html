<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Harmonograph — Lewis Conte Lab</title>
    <meta name="description" content="A generative harmonograph — damped-pendulum curves rendered on canvas." />
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg" />
    <style>
      :root {
        --bg: #0e0e10;
        --ink: #ededeb;
        --muted: #9a9a95;
        --faint: #6a6a6d;
        --line: #26262b;
        --accent: #ff4a1c;
        --mono: ui-monospace, "Cascadia Mono", "Segoe UI Mono", Menlo, monospace;
        --sans: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: var(--bg); color: var(--ink); font-family: var(--sans); overflow: hidden; }
      canvas { display: block; width: 100vw; height: 100vh; }
      .ui { position: fixed; pointer-events: none; z-index: 2; }
      .ui a, .ui button { pointer-events: auto; }
      .topbar { top: 0; left: 0; right: 0; display: flex; align-items: center; justify-content: space-between;
        padding: 1rem 1.25rem; }
      .back { font-family: var(--mono); font-size: .72rem; letter-spacing: .14em; text-transform: uppercase;
        color: var(--muted); text-decoration: none; }
      .back:hover { color: var(--ink); }
      .title { font-family: var(--mono); font-size: .72rem; letter-spacing: .14em; text-transform: uppercase; color: var(--faint); }
      .dock { bottom: 0; left: 0; right: 0; display: flex; align-items: flex-end; justify-content: space-between;
        gap: 1rem; padding: 1rem 1.25rem; flex-wrap: wrap; }
      .readout { font-family: var(--mono); font-size: .7rem; line-height: 1.7; color: var(--faint); white-space: pre; }
      .controls { display: flex; gap: .5rem; }
      button { font-family: var(--mono); font-size: .7rem; letter-spacing: .08em; text-transform: uppercase;
        color: var(--ink); background: transparent; border: 1px solid var(--line); padding: .5rem .8rem; cursor: pointer;
        transition: border-color .2s, color .2s, background .2s; }
      button:hover { border-color: var(--accent); }
      button.primary { background: var(--accent); border-color: var(--accent); color: var(--bg); }
      @media (max-width: 640px) { .readout { display: none; } }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>

    <div class="ui topbar">
      <a class="back" href="../">← Lab</a>
      <span class="title">Harmonograph</span>
    </div>
    <div class="ui dock">
      <pre class="readout" id="readout"></pre>
      <div class="controls">
        <button id="save">Save PNG</button>
        <button id="regen" class="primary">New figure</button>
      </div>
    </div>

    <script>
      // --- seeded RNG (mulberry32) so each figure is reproducible ----------
      function mulberry32(a) {
        return function () {
          a |= 0; a = (a + 0x6d2b79f5) | 0;
          let t = Math.imul(a ^ (a >>> 15), 1 | a);
          t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");
      const readout = document.getElementById("readout");
      let W, H, DPR, fig, raf;

      function resize() {
        DPR = Math.min(window.devicePixelRatio || 1, 2);
        W = canvas.width = Math.floor(innerWidth * DPR);
        H = canvas.height = Math.floor(innerHeight * DPR);
        if (fig) draw(fig); // redraw current figure at new size
      }

      function makeFigure(seed) {
        const rnd = mulberry32(seed);
        // Frequencies cluster near small integers for harmonic, legible curves.
        const near = () => {
          const base = 1 + Math.floor(rnd() * 4);
          return base + (rnd() - 0.5) * 0.04; // tiny detune -> slow precession
        };
        const pend = () => ({
          f: near(),
          p: rnd() * Math.PI * 2,
          a: 0.32 + rnd() * 0.16,
          d: 0.002 + rnd() * 0.006, // damping
        });
        return { seed, x1: pend(), x2: pend(), y1: pend(), y2: pend(), hue: rnd() };
      }

      function draw(f) {
        cancelAnimationFrame(raf);
        ctx.fillStyle = "#0e0e10";
        ctx.fillRect(0, 0, W, H);

        const cx = W / 2, cy = H / 2;
        const R = Math.min(W, H) * 0.42;
        const { x1, x2, y1, y2 } = f;
        const dt = 0.015;
        const tEnd = 220;
        const accent = [255, 74, 28];
        const tint = [255, 180, 120];

        ctx.globalCompositeOperation = "lighter";
        ctx.lineWidth = DPR;

        let t = 0;
        let prev = null;
        function pt(t) {
          const ex1 = Math.exp(-x1.d * t), ex2 = Math.exp(-x2.d * t);
          const ey1 = Math.exp(-y1.d * t), ey2 = Math.exp(-y2.d * t);
          const x = x1.a * Math.sin(x1.f * t + x1.p) * ex1 + x2.a * Math.sin(x2.f * t + x2.p) * ex2;
          const y = y1.a * Math.sin(y1.f * t + y1.p) * ey1 + y2.a * Math.sin(y2.f * t + y2.p) * ey2;
          return [cx + x * R, cy + y * R];
        }

        function step() {
          const batch = 600; // segments per frame
          for (let i = 0; i < batch && t < tEnd; i++, t += dt) {
            const [px, py] = pt(t);
            if (prev) {
              const k = t / tEnd;
              const r = accent[0] + (tint[0] - accent[0]) * k;
              const g = accent[1] + (tint[1] - accent[1]) * k;
              const b = accent[2] + (tint[2] - accent[2]) * k;
              ctx.strokeStyle = `rgba(${r | 0},${g | 0},${b | 0},0.06)`;
              ctx.beginPath();
              ctx.moveTo(prev[0], prev[1]);
              ctx.lineTo(px, py);
              ctx.stroke();
            }
            prev = [px, py];
          }
          if (t < tEnd) raf = requestAnimationFrame(step);
        }
        prev = null;
        step();
      }

      function info(f) {
        const r = (n) => n.toFixed(3);
        readout.textContent =
          `seed   0x${(f.seed >>> 0).toString(16).padStart(8, "0")}\n` +
          `freq   x ${r(f.x1.f)} / ${r(f.x2.f)}\n` +
          `       y ${r(f.y1.f)} / ${r(f.y2.f)}`;
      }

      function regen(seed) {
        fig = makeFigure(seed ?? (Math.random() * 2 ** 32) >>> 0);
        info(fig);
        draw(fig);
        // reflect seed in the URL so a figure can be shared / bookmarked
        history.replaceState(null, "", "?seed=" + (fig.seed >>> 0));
      }

      document.getElementById("regen").addEventListener("click", () => regen());
      document.getElementById("save").addEventListener("click", () => {
        const a = document.createElement("a");
        a.download = "harmonograph-" + (fig.seed >>> 0).toString(16) + ".png";
        a.href = canvas.toDataURL("image/png");
        a.click();
      });
      addEventListener("keydown", (e) => {
        if (e.code === "Space") { e.preventDefault(); regen(); }
        if (e.key.toLowerCase() === "s") document.getElementById("save").click();
      });
      addEventListener("pointerdown", (e) => {
        if (e.target.closest(".controls, .back")) return;
        regen();
      });
      addEventListener("resize", resize);

      const urlSeed = new URLSearchParams(location.search).get("seed");
      resize();
      regen(urlSeed ? urlSeed >>> 0 : undefined);
    </script>
  </body>
</html>
